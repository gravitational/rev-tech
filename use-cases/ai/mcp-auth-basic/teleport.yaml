version: v3
teleport:
  proxy_server: ellinj.teleport.sh:443
  auth_token: xfdsf
  data_dir: /Users/jeff/dev/rev-tech/use-cases/ai/mcp-auth-basic/teleport-data
  log:
    output: stderr
    severity: INFO
    format:
      output: text
      extra_fields: [timestamp, level, component, caller]

auth_service:
  enabled: false

proxy_service:
  enabled: false

ssh_service:
  enabled: false

app_service:
  enabled: true
  apps:
    - name: identity-aware-mcp
      uri: "mcp+http://localhost:9999/mcp"
      labels:
        env: dev
      rewrite:
        headers:
          - "Authorization: Bearer {{internal.id_token}}"
